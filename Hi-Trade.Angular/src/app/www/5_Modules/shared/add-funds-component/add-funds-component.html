@if (isOpen()) {
<div class="modal-overlay" (click)="onCancel()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>Add Funds</h2>
            <button class="close-btn" (click)="onCancel()">×</button>
        </div>
        <div class="modal-body">
            @if(!proceeded()){<div class="quantity-section">
                <label for="sellQuantity">Amount to Add (€)</label>
                <input id="sellQuantity" type="number" min="1" [(ngModel)]="amount" class="input-field" />
            </div>}
            @if(proceeded()){
            <mat-card class="quantity-section" style="margin: 25px">
                <mat-card-header class="w-100">
                    <mat-card-title style="
        margin-top: -16px;
        margin-left: -16px;
        margin-right: -16px;
        margin-bottom: 16px;
      ">
                        <mat-toolbar class="bg-primary text-white w-100p" style="border-top-right-radius: 4px; border-top-left-radius: 4px">
                            Payment Details
                        </mat-toolbar>
                    </mat-card-title>
                </mat-card-header>
                <mat-card-content>
                    <div [formGroup]="checkoutForm">
                        <div style="display: flex; flex-direction: row; gap: 10px">
                            <mat-form-field appearance="outline" style="flex: 1">
                                <mat-label>Name</mat-label>
                                <input matInput formControlName="name" />
                            </mat-form-field>
                            <mat-form-field appearance="outline" style="flex: 1">
                                <mat-label>Email</mat-label>
                                <input matInput formControlName="email" type="email" />
                            </mat-form-field>
                        </div>
                        <div style="display: flex; flex-direction: row; gap: 10px">
                            <mat-form-field appearance="outline" style="flex: 1">
                                <mat-label>Address</mat-label>
                                <input matInput formControlName="address" />
                            </mat-form-field>
                        </div>
                        <div style="display: flex; flex-direction: row; gap: 10px">
                            <mat-form-field appearance="outline" style="flex: 1">
                                <mat-label>ZIP Code</mat-label>
                                <input matInput formControlName="zipcode" />
                            </mat-form-field>
                            <mat-form-field appearance="outline" style="flex: 1">
                                <mat-label>City</mat-label>
                                <input matInput formControlName="city" />
                            </mat-form-field>
                        </div>
                        <div style="margin-bottom: 10px"></div>
                        @if (elementsOptions.clientSecret) {
                        <ngx-stripe-elements [stripe]="stripe" [elementsOptions]="elementsOptions">
                            <ngx-stripe-payment />
                        </ngx-stripe-elements>
                        }
                    </div>
                </mat-card-content>
            </mat-card>
            }

        </div>
        <div class="modal-footer">
            <button class="btn-cancel" (click)="onCancel()">Cancel</button>
            @if(!proceeded()){
            <button class="btn-submit" (click)="onProceed()">
                Proceed
            </button>
            }
            @else {
            <button class="btn-submit" [disabled]="paying()" (click)="collectPayment()">
                @if (paying()) {
                <span>PROCESSING...</span>
                } @else {
                <span>
                    PAY @if (amount()) {
                    <span>{{ amount() | currency: 'EUR' }}</span>
                    }
                </span>
                }
            </button>
            }
        </div>
    </div>
</div>
}
