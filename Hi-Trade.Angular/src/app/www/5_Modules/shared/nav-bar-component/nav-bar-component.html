<nav class="navbar-custom">
    <div class="navbar-custom-container">
        <div class="navbar-custom-logo" (click)="redirectTo([navConstants.home])">
            <span class="logo-icon">📈</span>
            <span class="logo-text">Hi-Trade</span>
        </div>
        <ul class="nav-menu mb-0">
            <li><a href="#features">Features</a></li>
            <li><a href="#pricing">Pricing</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="nav-buttons">
            @if (isAuthenticated) {
                <div class="profile-menu">
                    <button class="avatar-button" (click)="toggleProfileDropdown()" title="Profile">
                        <div class="avatar">{{ userAvatar }}</div>
                    </button>
                    
                    @if (showProfileDropdown) {
                        <div class="profile-dropdown" (click)="$event.stopPropagation()">
                            <div class="dropdown-header">
                                <div class="avatar-large">{{ userAvatar }}</div>
                                <div class="user-info">
                                    <p class="user-name">{{ userName }}</p>
                                    <p class="user-label">Trader</p>
                                </div>
                            </div>
                            <div class="dropdown-divider"></div>
                            <ul class="dropdown-menu">
                                <li><a href="#" (click)="closeProfileDropdown()">Profile</a></li>
                                <li><a href="#" (click)="closeProfileDropdown()">Settings</a></li>
                                <li><a href="#" (click)="closeProfileDropdown()">Portfolio</a></li>
                            </ul>
                            <div class="dropdown-divider"></div>
                            <button class="logout-button" (click)="onLogout()">Logout</button>
                        </div>
                    }
                </div>
            } @else {
                <!-- Login/Signup Buttons -->
                <button class="btn-login" (click)="redirectTo([navConstants.login])">Login</button>
                <button class="btn-signup" (click)="redirectTo([navConstants.signup])">Sign Up</button>
            }
        </div>
    </div>
</nav>
