<app-nav-bar-component></app-nav-bar-component>
<div class="login-container">
  <div class="login-wrapper">
    <!-- Logo Section -->
    <div class="logo-section" (click)="redirectTo([navConstants.home])">
      <div class="logo-icon">📈</div>
      <span class="logo-text">Hi-Trade</span>
    </div>

    <!-- Login Form -->
    <div class="login-form">
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your account to continue trading</p>

      <form (ngSubmit)="onLogin()" #loginForm="ngForm">
        <!-- Email Field -->
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="your@email.com"
            [(ngModel)]="email"
            required
          />
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Enter your password"
            [(ngModel)]="password"
            required
          />
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="rememberMe" [(ngModel)]="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-login-submit">Sign In</button>
      </form>

      <!-- Sign Up Link -->
      <p class="signup-link">
        Don't have an account? <a (click)="redirectTo([navConstants.signup])">Sign up here</a>
      </p>
    </div>
  </div>
</div>
